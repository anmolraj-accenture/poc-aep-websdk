<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Model Score Calculation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ✅ CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===================== -->
  <!-- ✅ PAGE 1 CONTENT -->
  <!-- ===================== -->
  <form id="subscriptionForm">
    <p>Choose your preferred Offer:</p>

    <div>
      <input type="radio" id="stocks" name="assetclass" value="Stocks">
      <label for="stocks">Offer1-Deals</label>
    </div>

    <div>
      <input type="radio" id="bonds" name="assetclass" value="Bonds">
      <label for="bonds">Offer2-Deals</label>
    </div>

    <div>
      <input type="radio" id="cd" name="assetclass" value="CD">
      <label for="cd">Offer3-Deals</label>
    </div>

    <br>
    <button type="button" onclick="handleSubmission()">Submit Preference</button>
  </form>

  <div id="error-message" style="color:red;"></div>
  <div id="message" style="color:green;font-weight:bold;"></div>

  <!-- ===================== -->
  <!-- ✅ PAGE 2 HTML ADDITION -->
  <!-- ===================== -->
  <hr />
  <h2>Personalized Offer</h2>
  <div id="ajo-offer"></div>

  <!-- ===================== -->
  <!-- ✅ CONSOLIDATED JS (PAGE 1 + PAGE 2) -->
  <!-- ===================== -->
  <script>
    /* ===============================
       ✅ PAGE 1 LOGIC
    =============================== */
    function handleSubmission() {
      const selected = document.querySelector('input[name="assetclass"]:checked');
      if (!selected) {
        document.getElementById("error-message").textContent = "Please select an offer.";
        return;
      }

      localStorage.setItem("PreferredInterest", selected.value);
      document.getElementById("error-message").textContent = "";
      document.getElementById("message").textContent =
        "✅ Preference saved: " + selected.value;
    }

    /* ===============================
       ✅ PAGE 2 LOGIC (UNCHANGED)
    =============================== */
    (() => {
      const SURFACE_URI =
        "web://anmolraj-accenture.github.io/poc-decisioning2#ajo-offer";
      const CONTENT_SCHEMA =
        "https://ns.adobe.com/personalization/json-content-item";

      function getPreferredInterest() {
        const v = localStorage.getItem("PreferredInterest");
        return v && v.trim() ? v.trim() : null;
      }

      function setError(msg) {
        const box = document.getElementById("error-message");
        if (box) box.textContent = msg || "";
      }

      function setMessage(msg) {
        const box = document.getElementById("message");
        if (box) box.textContent = msg || "";
      }

      function decodeHtmlEntities(html) {
        const txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function normalizeContentToHtml(content) {
        if (typeof content === "string") {
          return decodeHtmlEntities(content);
        }

        if (content && typeof content === "object") {
          return `
            <div class="offer-card">
              <h3>Personalized Offer</h3>
              <pre style="white-space: pre-wrap;">
${escapeHtml(JSON.stringify(content, null, 2))}
              </pre>
            </div>
          `;
        }
        return null;
      }

      function pickPropositionForSurface(result) {
        const propositions = result?.propositions || [];
        return (
          propositions.find(p => p.scope === SURFACE_URI) ||
          propositions[0] ||
          null
        );
      }

      function renderOffer(result) {
        console.log("🔍 Web SDK decision response:", result);

        const container = document.getElementById("ajo-offer");
        if (!container) return;

        const proposition = pickPropositionForSurface(result);
        const item =
          proposition?.items?.find(i => i.schema === CONTENT_SCHEMA) ||
          proposition?.items?.[0];
        const content = item?.data?.content;

        const html = normalizeContentToHtml(content);

        if (html) {
          container.innerHTML = html;
          setMessage("✅ Personalized offer loaded.");
        } else {
          container.innerHTML =
            "<p>No personalized offers available at this time.</p>";
        }
      }

      function runPersonalization() {
        const preferredInterest = getPreferredInterest();

        console.log(
          "🚀 Fetching personalization for surface:",
          SURFACE_URI,
          "interest:",
          preferredInterest
        );

        return alloy("sendEvent", {
          renderDecisions: true,
          personalization: {
            surfaces: [SURFACE_URI],
            schemas: [CONTENT_SCHEMA],
            defaultPersonalizationEnabled: false
          },
          xdm: {
            eventType: "decisioning.propositionFetch",
            _accenture_partner: {
              Interest: {
                PreferredInterest: preferredInterest || "unknown"
              }
            }
          }
        })
          .then(renderOffer)
          .catch(err => {
            console.error("❌ sendEvent failed:", err);
            setError("Personalization failed.");
          });
      }

      function waitForAlloy(cb, retries = 60) {
        if (typeof alloy === "function") {
          console.log("✅ Alloy loaded.");
          cb();
        } else if (retries > 0) {
          setTimeout(() => waitForAlloy(cb, retries - 1), 250);
        } else {
          setError("Adobe Alloy failed to load.");
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        waitForAlloy(runPersonalization);
      });
    })();
  </script>

  <!-- ✅ ADOBE LAUNCH MUST BE LAST -->
  <script
    src="https://assets.adobedtm.com/e72b4113c11a/523d00e5384d/launch-37956bbe7fae.min.js"
    async
  ></script>

</body>
</html>
